version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: finrag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    environment:
      - QDRANT__LOG_LEVEL=INFO
    networks:
      - finrag-network

  mongodb:
    image: mongo:7
    container_name: finrag_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_storage:/data/db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=financial_rag
    networks:
      - finrag-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: finrag_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    restart: unless-stopped
    networks:
      - finrag-network
    depends_on:
      - qdrant

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: finrag_server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/financial_rag
      - PORT=5000
    restart: unless-stopped
    networks:
      - finrag-network
    depends_on:
      - mongodb
      - backend

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: finrag_client
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - finrag-network
    depends_on:
      - server

networks:
  finrag-network:
    driver: bridge

volumes:
  qdrant_storage:
  mongo_storage:
