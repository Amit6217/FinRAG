version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: finrag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    environment:
      - QDRANT__LOG_LEVEL=INFO

  mongodb:
    image: mongo:7
    container_name: finrag_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_storage:/data/db
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=financial_rag

volumes:
  qdrant_storage:
  mongo_storage:
